<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELVET VIBRANCE — Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --velvet: #8B1A1A;
      --gold:   #D4AF37;
      --dark:   #000000;
      --text:   #f5ede0;
      --muted:  rgba(245,237,224,0.42);
      --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Animated red paths background ── */
    .bg-paths {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-paths svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── Center content ── */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 2rem;
    }

    /* ── Logo ── */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.2s forwards;
    }

    /* ── Divider line ── */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(212,175,55,0.5), transparent);
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.4s forwards;
    }

    /* ── Main heading ── */
    .heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 900;
      font-style: italic;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--text);
      text-shadow: 0 0 80px rgba(139,26,26,0.5);
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.5s forwards;
    }

    .heading em {
      color: var(--gold);
      font-style: italic;
    }

    /* ── Subline ── */
    .subline {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      max-width: 340px;
      line-height: 2;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.75s forwards;
    }

    /* ── Gold status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      border: 1px solid rgba(212,175,55,0.28);
      border-radius: 99px;
      padding: 0.55rem 1.4rem;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(212,175,55,0.7);
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 1s forwards;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--velvet);
      box-shadow: 0 0 8px rgba(139,26,26,0.9);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Back link ── */
    .back-link {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid rgba(245,237,224,0.15);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 1.2s forwards;
    }

    .back-link:hover {
      color: var(--gold);
      border-color: rgba(212,175,55,0.5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scroll progress stub ── */
    #scroll-progress {
      position: fixed; top: 0; left: 0;
      height: 1px; width: 100%;
      background: linear-gradient(90deg, var(--velvet), var(--gold));
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="scroll-progress"></div>

  <!-- Animated red path background -->
  <div class="bg-paths" id="bg-paths"></div>

  <div class="stage">
    <p class="logo">Velvet Vibrance</p>
    <div class="divider"></div>
    <h1 class="heading">Under<br /><em>Maintenance</em></h1>
    <p class="subline">We're refining the experience.<br />Back shortly.</p>
    <span class="badge">
      <span class="badge-dot"></span>
      Work in progress
    </span>
    <a href="/" class="back-link">← Return to site</a>
  </div>

  <script>
    (function () {
      var container = document.getElementById('bg-paths');
      var svgNS = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '-600 -420 1900 1420');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('overflow', 'visible');

      var DASH = 660, GAP = 1540, LEN = 2200;
      var styleEl = document.createElement('style');
      var keyframes = '';
      var idx = 0;

      [1, -1].forEach(function (pos) {
        for (var i = 0; i < 36; i++) {
          var x = 380 - i * 5 * pos;
          var d = 'M-' + x + ' -' + (189 + i * 6) +
                  'C-' + x + ' -' + (189 + i * 6) +
                  ' -' + (312 - i * 5 * pos) + ' ' + (216 - i * 6) +
                  ' '  + (152 - i * 5 * pos) + ' ' + (343 - i * 6) +
                  'C'  + (616 - i * 5 * pos) + ' ' + (470 - i * 6) +
                  ' '  + (684 - i * 5 * pos) + ' ' + (875 - i * 6) +
                  ' '  + (684 - i * 5 * pos) + ' ' + (875 - i * 6);

          var opacity  = Math.min(0.18 + i * 0.024, 1).toFixed(3);
          var sw       = (0.6 + i * 0.04).toFixed(2);
          var dur      = (18 + i * 0.28 + Math.random() * 6).toFixed(1);
          var start    = -Math.round(Math.random() * LEN);
          var name     = 'mp' + idx;

          var path = document.createElementNS(svgNS, 'path');
          path.setAttribute('d', d);
          path.setAttribute('stroke', 'rgba(220,30,30,' + opacity + ')');
          path.setAttribute('stroke-width', sw);
          path.setAttribute('stroke-dasharray', DASH + ' ' + GAP);
          path.setAttribute('stroke-dashoffset', start);
          path.setAttribute('fill', 'none');

          keyframes += '@keyframes ' + name + '{' +
            '0%{stroke-dashoffset:' + start + '}' +
            '100%{stroke-dashoffset:' + (start - LEN) + '}}';

          path.style.animation = name + ' ' + dur + 's linear infinite';
          svg.appendChild(path);
          idx++;
        }
      });

      styleEl.textContent = keyframes;
      document.head.appendChild(styleEl);
      container.appendChild(svg);
    })();
  </script>
</body>
</html>
